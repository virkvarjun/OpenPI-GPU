  /* ---------- tokens (categorical trio validated: dark band, CVD >= 11 with direction+label encoding) ---- */
  :root {
    --bg: #0a0e14;
    --surface: #0e141d;
    --surface-2: #111927;
    --edge: #1d2735;
    --ink: #dbe4ee;
    --ink-2: #8b98a9;
    --ink-3: #55606e;
    --ag: #0d9bbd;         /* all-gather (cyan)      */
    --rs: #c2299f;         /* reduce-scatter (magenta) */
    --ar: #a97b1e;         /* all-reduce (amber)     */
    --ag-glow: #35e0ff;
    --rs-glow: #ff4fd8;
    --ar-glow: #ffb454;
    --ok: #2bb673;         /* status: alive (always with ● + label) */
    --bad: #e04b55;        /* status: dead  (always with ✗ + label) */
    --warn: #d9a03c;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: var(--bg); color: var(--ink); font-family: var(--mono); overflow: hidden;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }

  /* ---------- stage & camera ---------- */
  #stage { position: fixed; inset: 0; overflow: hidden; }
  #world {
    position: absolute; inset: 0;
    transform-origin: 50% 50%;
    transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  #drift { position: absolute; inset: 0; will-change: transform; }
  @media (prefers-reduced-motion: reduce) {
    #world { transition: none; }
  }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; gap: 2.2vw; align-items: baseline;
    padding: 1.1vh 1.6vw;
    background: linear-gradient(to bottom, rgba(10,14,20,.92), rgba(10,14,20,0));
    font-size: clamp(12px, 1.05vw, 18px);
    letter-spacing: .06em;
  }
  .hud-item { white-space: nowrap; }
  .hud-item .k { color: var(--ink-3); font-size: .72em; letter-spacing: .18em; }
  .hud-item .v { color: var(--ink); font-size: 1.25em; font-variant-numeric: tabular-nums; }
  .hud-item .v.dim { color: var(--ink-3); }
  #hud-alive .v.ok { color: var(--ok); }
  #hud-alive .v.bad { color: var(--bad); }
  #hud-mfu { display: none; }   /* only shown if the real profiler reports one */
  #hud-ckpt .v.flash { animation: ckflash 1.2s ease-out; }
  @keyframes ckflash { 0% { color: var(--ag-glow); text-shadow: 0 0 14px var(--ag-glow); } 100% { color: var(--ink); } }
  #hud-spacer { flex: 1; }
  #wordmark { color: var(--ink-2); font-size: 1.05em; letter-spacing: .34em; font-weight: 600; }
  #wordmark b { color: var(--ink); }

  /* ---------- pane grid ---------- */
  #grid {
    position: absolute; left: 4vw; right: 4vw; top: 9vh; bottom: 30vh;
    display: grid; gap: 2.2vw;
  }
  .pane {
    background: var(--surface);
    border: 1px solid var(--edge);
    border-radius: 10px;
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
    position: relative;
    transition: opacity .5s ease, filter .5s ease, border-color .5s ease;
    cursor: pointer;
  }
  .pane.pending { opacity: .22; }
  .pane.igniting { animation: ignite .9s ease-out; }
  @keyframes ignite {
    0% { opacity: .22; filter: brightness(2.2); box-shadow: 0 0 34px rgba(53,224,255,.25); }
    100% { opacity: 1; filter: brightness(1); box-shadow: none; }
  }
  .pane.dead {
    opacity: .55; filter: saturate(.4) brightness(.62);
    border-color: rgba(224, 75, 85, .75);
    box-shadow: 0 0 34px rgba(224, 75, 85, .16), inset 0 0 60px rgba(224, 75, 85, .07);
  }
  .pane.dead .pane-head { background: rgba(224, 75, 85, .14); }
  .pane.stalled .pane-body { opacity: .45; }
  .pane.stalled .pane-status { color: var(--warn); }
  .pane-head {
    display: flex; align-items: center; gap: 1em;
    padding: .55em .9em;
    background: var(--surface-2);
    border-bottom: 1px solid var(--edge);
    font-size: clamp(11px, .85vw, 15px);
    letter-spacing: .1em;
    flex: none;
  }
  .pane-title { color: var(--ink); font-weight: 600; }
  .pane-pid { color: var(--ink-3); }
  .pane-status { margin-left: auto; font-size: .92em; }
  .pane-status.ok { color: var(--ok); }
  .pane-status.bad { color: var(--bad); }
  .pane-body {
    flex: 1; min-height: 0; overflow: hidden;
    padding: .6em .9em;
    font-size: clamp(11px, .82vw, 15px);
    line-height: 1.52;
    color: var(--ink-2);
    display: flex; flex-direction: column; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 26%);
    mask-image: linear-gradient(to bottom, transparent, black 26%);
  }
  .pane-body .ln { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pane-body .ln.step { color: var(--ink); }
  .pane-body .ln.step .loss { color: var(--ag-glow); }
  .pane-body .ln.sys { color: var(--ink-3); }

  /* ---------- traces: a light bus BETWEEN the panes (z-under them, anchored at their feet) ---------- */
  #traces { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: visible; }
  #grid, #bottom { z-index: 2; }

  /* ---------- supervisor + loss curve row ---------- */
  #bottom {
    position: absolute; left: 4vw; right: 4vw; bottom: 3.4vh; height: 24vh;
    display: grid; grid-template-columns: 7fr 5fr; gap: 2.2vw;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--edge);
    border-radius: 10px;
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  .panel-head {
    padding: .45em .9em; background: var(--surface-2); border-bottom: 1px solid var(--edge);
    font-size: clamp(10px, .74vw, 14px); letter-spacing: .18em; color: var(--ink-3);
    display: flex; gap: 1.2em; align-items: center;
  }
  #curve-body { flex: 1; min-height: 0; position: relative; }
  #curve-body canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #curve-label {
    position: absolute; right: .9em; top: .5em;
    color: var(--ink); font-size: clamp(11px, .9vw, 16px); font-variant-numeric: tabular-nums;
  }
  #curve-label b { color: var(--ag-glow); font-weight: 600; }
  #sup-body {
    flex: 1; min-height: 0; overflow: hidden;
    padding: .6em .9em; font-size: clamp(11px, .8vw, 15px); line-height: 1.55;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #sup-body .ln { color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #sup-body .ln.elastic { color: var(--warn); }
  #sup-body .ln.kill { color: var(--bad); }
  #sup-body .ln.good { color: var(--ok); }
  #sup-idle { color: var(--ink-3); font-style: italic; }
  #sup-panel.hot { border-color: rgba(217,160,60,.55); box-shadow: 0 0 26px rgba(217,160,60,.08); }

  /* legend chips: collective identity is never color-alone (label + direction) */
  .chip { display: inline-flex; align-items: center; gap: .45em; color: var(--ink-2); letter-spacing: .06em; }
  .chip .sw { width: 1.5em; height: 3px; border-radius: 2px; display: inline-block; }
  #hud-legend {
    position: fixed; top: 4.6vh; right: 1.6vw; z-index: 30;
    display: flex; gap: 1.4em; font-size: clamp(10px, .78vw, 14px); white-space: nowrap;
  }

  /* ---------- narrative caption: one plain sentence per beat, so the story reads at a glance ---------- */
  #caption {
    position: fixed; top: 17.5vh; left: 50%; transform: translate(-50%, -8px); z-index: 25;
    max-width: 78vw; text-align: center;
    padding: .55em 1.3em; border-radius: 999px;
    background: rgba(10, 14, 20, .88); border: 1px solid var(--edge);
    font-size: clamp(14px, 1.25vw, 24px); letter-spacing: .05em; color: var(--ink);
    opacity: 0; pointer-events: none;
    transition: opacity .45s ease, transform .45s ease, border-color .45s ease, color .45s ease;
    white-space: nowrap;
  }
  #caption.show { opacity: 1; transform: translate(-50%, 0); }
  #caption.red { color: #ff8a91; border-color: rgba(224, 75, 85, .6); box-shadow: 0 0 30px rgba(224, 75, 85, .12); }
  #caption.amber { color: #ffcf87; border-color: rgba(217, 160, 60, .55); box-shadow: 0 0 30px rgba(217, 160, 60, .10); }
  #caption.green { color: #7fe6b2; border-color: rgba(43, 182, 115, .55); box-shadow: 0 0 30px rgba(43, 182, 115, .12); }

  /* ---------- honesty footnote (always present) ---------- */
  #honesty {
    position: fixed; bottom: .55vh; left: 0; right: 0; z-index: 40;
    text-align: center; font-size: clamp(9px, .68vw, 13px); letter-spacing: .05em; color: var(--ink-3);
  }

  /* ---------- chrome (hidden in capture mode) ---------- */
  #chrome {
    position: fixed; top: 1.1vh; right: 1.6vw; z-index: 50;
    display: flex; gap: .8em; align-items: center;
    font-size: clamp(10px, .78vw, 14px); color: var(--ink-3);
  }
  #chrome .mode { border: 1px solid var(--edge); border-radius: 6px; padding: .25em .7em; }
  body.capture #chrome { display: none; }
  body.capture { cursor: none; }

  /* ---------- overlays (title / proof / coda / end) ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    background: rgba(7, 10, 15, .88);
    opacity: 0; pointer-events: none;
    transition: opacity .8s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay-inner { max-width: 72vw; }
  #title-card { text-align: center; }
  #title-card h1 { font-size: clamp(34px, 5vw, 92px); letter-spacing: .42em; font-weight: 700; text-indent: .42em; }
  #title-card p { margin-top: 1.6em; color: var(--ink-2); font-size: clamp(13px, 1.15vw, 22px); letter-spacing: .12em; }
  #title-card .sub { margin-top: .8em; color: var(--ink-3); font-size: clamp(11px, .85vw, 16px); }

  /* ---------- proof / coda overlays ---------- */
  .proof-box {
    background: var(--surface); border: 1px solid var(--edge); border-radius: 12px;
    padding: 2.2em 2.6em; box-shadow: 0 30px 90px rgba(0,0,0,.55);
    font-size: clamp(12px, 1vw, 19px);
  }
  .proof-box h2 { color: var(--ink); letter-spacing: .22em; font-size: 1.05em; margin-bottom: 1.1em; }
  .proof-box h2 .src { color: var(--ink-3); letter-spacing: .05em; font-weight: 400; font-size: .78em; }
  .proof-line { color: var(--ink-2); margin: .5em 0; opacity: 0; transform: translateY(6px); transition: opacity .5s ease, transform .5s ease; }
  .proof-line.show { opacity: 1; transform: none; }
  .proof-line code { color: var(--ink); }
  .idx-row { display: flex; align-items: center; gap: .5em; margin: .55em 0; opacity: 0; transition: opacity .5s ease; }
  .idx-row.show { opacity: 1; }
  .idx-row .row-label { width: 15em; color: var(--ink-3); font-size: .85em; flex: none; }
  .idx { min-width: 2.6em; text-align: center; padding: .28em .3em; border-radius: 6px;
         background: var(--surface-2); border: 1px solid var(--edge); color: var(--ink);
         font-variant-numeric: tabular-nums; transition: border-color .3s, box-shadow .3s, color .3s; }
  .idx.match { border-color: var(--ok); box-shadow: 0 0 10px rgba(43,182,115,.25); }
  .idx.mismatch { border-color: var(--bad); color: var(--bad); }
  .sha-line { display: flex; gap: 2em; margin-top: 1em; color: var(--ink-3); opacity: 0; transition: opacity .5s ease; }
  .sha-line.show { opacity: 1; }
  .sha-line b { color: var(--ink); font-weight: 600; }
  .verdict { margin-top: 1.2em; font-size: 1.25em; letter-spacing: .12em; opacity: 0; transform: scale(.96); transition: opacity .6s ease, transform .6s cubic-bezier(0.22, 1, 0.36, 1); }
  .verdict.show { opacity: 1; transform: none; }
  .verdict.ok { color: var(--ok); text-shadow: 0 0 22px rgba(43,182,115,.35); }
  .verdict.bad { color: var(--bad); }

  /* ---------- end card ---------- */
  #end-card .overlay-inner { text-align: center; max-width: 64vw; }
  #end-card h1 { font-size: clamp(28px, 3.6vw, 66px); letter-spacing: .4em; text-indent: .4em; }
  #end-card .runline { margin-top: 1.2em; color: var(--ink-2); font-size: clamp(12px, 1vw, 19px); }
  #end-card .findings { margin-top: 2em; padding: 1.4em 1.8em; border: 1px solid var(--edge); border-radius: 10px;
                        background: var(--surface); text-align: left; color: var(--ink-2);
                        font-size: clamp(11px, .85vw, 16px); line-height: 1.7; }
  #end-card .findings .cap { color: var(--ink-3); font-size: .82em; letter-spacing: .14em; margin-bottom: .6em; }
  #end-card .findings b { color: var(--ink); }
  #end-card .repo { margin-top: 1.6em; color: var(--ink-3); letter-spacing: .1em; font-size: clamp(11px, .85vw, 16px); }

  /* traces */
  #traces path { fill: none; stroke-linecap: round; }
  #traces .base { opacity: .26; transition: opacity .6s ease, stroke .6s ease; }
  #traces .base.dead { opacity: .05; }
  #traces .ring-base { opacity: .16; }
</style>
</head>
<body>
<div id="stage">
  <div id="world">
   <div id="drift">
    <div id="grid"></div>
    <svg id="traces"></svg>
    <div id="bottom">
      <div class="panel" id="curve-panel">
        <div class="panel-head">
          <span>TRAINING LOSS — real values from the run</span>
        </div>
        <div id="curve-body">
          <canvas id="curve"></canvas>
          <div id="curve-label"></div>
        </div>
      </div>
      <div class="panel" id="sup-panel">
        <div class="panel-head"><span>SUPERVISOR — scripts/elastic_launch.py</span></div>
        <div id="sup-body"><div class="ln" id="sup-idle">quiet. nothing to do.</div></div>
      </div>
    </div>
   </div>
  </div>

  <div id="hud">
    <span id="wordmark"><b>SHARDER</b></span>
    <span class="hud-item" id="hud-step"><span class="k">STEP </span><span class="v dim">—</span></span>
    <span class="hud-item" id="hud-ms"><span class="k">MS/STEP </span><span class="v dim">—</span></span>
    <span class="hud-item" id="hud-mfu"><span class="k">MFU </span><span class="v dim">—</span></span>
    <span class="hud-item" id="hud-alive"><span class="k">ALIVE </span><span class="v dim">—</span></span>
    <span class="hud-item" id="hud-ckpt"><span class="k">CKPT </span><span class="v dim">—</span></span>
    <span class="hud-item" id="hud-wall"><span class="k">WALL </span><span class="v dim">0:00</span></span>
    <span id="hud-spacer"></span>
  </div>
  <div id="hud-legend"></div>

  <div id="chrome"></div>
  <div id="caption"></div>
  <div id="honesty"></div>

  <div class="overlay" id="title-card">
    <div class="overlay-inner">
      <h1>SHARDER</h1>
      <p>fault-tolerant multi-host JAX training for openpi</p>
      <p class="sub" id="title-sub"></p>
    </div>
  </div>
  <div class="overlay" id="proof-card"><div class="overlay-inner"><div class="proof-box" id="proof-box"></div></div></div>
  <div class="overlay" id="coda-card"><div class="overlay-inner"><div class="proof-box" id="coda-box"></div></div></div>
  <div class="overlay" id="end-card"><div class="overlay-inner" id="end-inner"></div></div>
</div>

<script>
"use strict";
/* =========================================================================================
   event ingestion — the JSONL stream is the single source of truth
   ========================================================================================= */
const qs = new URLSearchParams(location.search);
const CAPTURE = qs.get("capture") === "1";                 // hide chrome + fixed camera (clean screen-record)
const FASTCUT = qs.get("realtime") == null;                // 20s beat-budgeted cut is the DEFAULT for replay;
                                                           // pass ?realtime=1 for the full real-pace playback
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;
if (CAPTURE) document.body.classList.add("capture");

const S = {
  meta: null,
  nproc: 0,
  procs: new Map(),        // k -> {el, body, status, pid, step, alive, lines}
  curve: [],               // [{step, loss}] from the lowest-index reporting proc
  curveProc: null,
  maxStep: -1,
  ckpt: null,
  wall: 0,
  wallMs: [],              // recent per-step wall ms (rolling)
  profile: null,           // {median_ms?, mfu?} from a [profile] event
  collectives: null,       // {ops: {...}} from the compiled HLO
  killedProc: null,
  killedOnce: new Set(),
  killCkpt: null,
  resumes: 0,
  ended: false,
};

const $ = (id) => document.getElementById(id);
const grid = $("grid"), supBody = $("sup-body");

function fmtWall(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}
function median(a) {
  if (!a.length) return null;
  const s = [...a].sort((x, y) => x - y);
  return s[Math.floor(s.length / 2)];
}
function fmtMs(ms) { return ms >= 10000 ? `${(ms / 1000).toFixed(1)} s` : `${Math.round(ms)} ms`; }
function plural(n, w) { return `${n} ${w}${n === 1 ? "" : "es"}`; }

/* ---------- panes ---------- */
function makePane(k) {
  const el = document.createElement("div");
  el.className = "pane pending";
  el.dataset.proc = k;
  el.innerHTML = `
    <div class="pane-head">
      <span class="pane-title">PROC ${k}</span>
      <span class="pane-pid"></span>
      <span class="pane-status">○ waiting</span>
    </div>
    <div class="pane-body"></div>`;
  el.addEventListener("click", () => liveKill(k));
  grid.appendChild(el);
  const p = {
    el, k,
    body: el.querySelector(".pane-body"),
    pidEl: el.querySelector(".pane-pid"),
    statusEl: el.querySelector(".pane-status"),
    pid: null, step: -1, alive: false,
  };
  S.procs.set(k, p);
  return p;
}
function pane(k) { return S.procs.get(k) || makePane(k); }

function setGrid(n) {
  S.nproc = n;
  grid.style.gridTemplateColumns = `repeat(${Math.min(n, 4)}, 1fr)`;
  for (let k = 0; k < n; k++) pane(k);
}

function paneLine(k, html, cls) {
  const p = pane(k);
  const div = document.createElement("div");
  div.className = "ln " + (cls || "");
  div.innerHTML = html;
  p.body.appendChild(div);
  while (p.body.children.length > 14) p.body.removeChild(p.body.firstChild);
}

function paneStatus(k, state) { // 'up' | 'dead' | 'stalled' | 'pending'
  const p = pane(k);
  p.el.classList.remove("pending", "dead", "stalled");
  if (state === "up") {
    p.alive = true;
    p.el.classList.add("igniting");
    setTimeout(() => p.el.classList.remove("igniting"), 950);
    p.statusEl.textContent = S.killedOnce.has(k) ? "● REVIVED" : "● ALIVE";
    p.statusEl.className = "pane-status ok";
  } else if (state === "dead") {
    p.alive = false;
    p.el.classList.add("dead");
    p.statusEl.textContent = "✗ KILLED";
    p.statusEl.className = "pane-status bad";
  } else if (state === "stalled") {
    p.el.classList.add("stalled");
    p.statusEl.textContent = "◌ stalled — waiting on dead peer";
    p.statusEl.className = "pane-status";
  } else {
    p.el.classList.add("pending");
    p.statusEl.textContent = "○ waiting";
    p.statusEl.className = "pane-status";
  }
  hudAlive();
}

/* ---------- HUD ---------- */
function hudSet(id, v, dim) {
  const el = $(id).querySelector(".v");
  el.textContent = v;
  el.classList.toggle("dim", !!dim);
}
function hudAlive() {
  const up = [...S.procs.values()].filter(p => p.alive).length;
  const el = $("hud-alive").querySelector(".v");
  el.textContent = `${up}/${S.nproc || "—"}`;
  el.className = "v " + (S.nproc && up === S.nproc ? "ok" : up < S.nproc ? "bad" : "");
}
function hudMs() {
  if (S.profile && S.profile.median_ms) {
    hudSet("hud-ms", `${fmtMs(S.profile.median_ms)} (device)`, false);
  } else {
    const m = median(S.wallMs);
    if (m != null) hudSet("hud-ms", `${fmtMs(m)} (wall)`, false);
  }
  // MFU tile appears ONLY if the real profiler reported one (needs a real peak-FLOPs for the device).
  if (S.profile && S.profile.mfu != null) {
    $("hud-mfu").style.display = "";
    hudSet("hud-mfu", `${(S.profile.mfu * 100).toFixed(1)}%`, false);
  }
}

/* ---------- loss curve (single series; recessive grid; direct label, no legend box) ---------- */
const curveCv = $("curve");
let curveDirty = false;
function drawCurve() {
  curveDirty = false;
  const body = $("curve-body");
  const w = body.clientWidth, h = body.clientHeight;
  if (!w || !h) return;
  const dpr = devicePixelRatio || 1;
  if (curveCv.width !== Math.round(w * dpr) || curveCv.height !== Math.round(h * dpr)) {
    curveCv.width = Math.round(w * dpr);
    curveCv.height = Math.round(h * dpr);
  }
  const ctx = curveCv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const pts = S.curve;
  if (pts.length < 2) return;
  const x0 = 10, x1 = w - 10, y0 = h - 12, y1 = 10;
  const sMin = pts[0].step, sMax = Math.max(pts[pts.length - 1].step, sMin + 1);
  let lMin = Infinity, lMax = -Infinity;
  for (const p of pts) { if (p.loss < lMin) lMin = p.loss; if (p.loss > lMax) lMax = p.loss; }
  const pad = (lMax - lMin || 1) * 0.12;
  lMin -= pad; lMax += pad;
  const X = s => x0 + (s - sMin) / (sMax - sMin) * (x1 - x0);
  const Y = l => y0 + (l - lMin) / (lMax - lMin) * (y1 - y0);
  // recessive grid: 3 horizontal lines
  ctx.strokeStyle = "rgba(139,152,169,.10)";
  ctx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const y = y1 + (y0 - y1) * i / 4;
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  }
  // the series: 2px, validated cyan, soft glow
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--ag").trim();
  ctx.lineWidth = 2;
  ctx.shadowColor = "rgba(53,224,255,.35)";
  ctx.shadowBlur = 6;
  ctx.beginPath();
  pts.forEach((p, i) => { const x = X(p.step), y = Y(p.loss); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  ctx.stroke();
  ctx.shadowBlur = 0;
  const last = pts[pts.length - 1];
  $("curve-label").innerHTML = `loss <b>${last.loss.toFixed(4)}</b> <span style="color:var(--ink-3)">@ step ${last.step}</span>`;
}
function curveMark() {
  if (!curveDirty) { curveDirty = true; requestAnimationFrame(drawCurve); }
}
addEventListener("resize", curveMark);

/* ---------- supervisor panel ---------- */
function supLine(text, cls) {
  const idle = $("sup-idle");
  if (idle) idle.remove();
  const div = document.createElement("div");
  div.className = "ln " + (cls || "");
  // display-shorten absolute interpreter/script paths — the content stays real, the noise goes
  div.textContent = text.replace(/\/\S*\/python[\d.]*\b/g, "python").replace(/\/\S*\/(scripts\/)/g, "$1");
  supBody.appendChild(div);
  while (supBody.children.length > 8) supBody.removeChild(supBody.firstChild);
}

/* ---------- narrative caption ---------- */
let captionTimer = null, captionShownAt = 0, captionQueued = null;
function caption(html, tone, holdMs) {   // holdMs omitted -> sticky until the next caption
  // a caption owns the screen for a minimum before the next may replace it (no flash-throughs)
  const minHold = 2600;
  const now = performance.now();
  const wait = Math.max(0, minHold - (now - captionShownAt));
  if (captionQueued) clearTimeout(captionQueued);
  if (wait > 0) { captionQueued = setTimeout(() => caption(html, tone, holdMs), wait); return; }
  captionShownAt = now;
  const el = $("caption");
  el.innerHTML = html;
  el.className = "show " + (tone || "");
  if (captionTimer) { clearTimeout(captionTimer); captionTimer = null; }
  if (holdMs) captionTimer = setTimeout(() => el.classList.remove("show"), holdMs);
}
function captionClear() {
  if (captionQueued) { clearTimeout(captionQueued); captionQueued = null; }
  $("caption").classList.remove("show");
}

/* =========================================================================================
   event application — one function, both modes
   ========================================================================================= */
function apply(ev) {
  S.wall = ev.t;
  hudSet("hud-wall", fmtWall(ev.t), false);
  switch (ev.type) {

    case "meta": {
      S.meta = ev;
      setGrid(ev.nproc);
      $("title-sub").textContent =
        `${plural(ev.nproc, "process")} · batch ${ev.batch_size} · config "${ev.config}" · ${ev.backend} · run ${ev.run_id} @ ${ev.git_sha}`;
      $("honesty").textContent =
        `${plural(ev.nproc, "process")} on one machine — the same distributed init, data sharding, exact resume, ` +
        `and restart supervision a multi-node run uses. Not a validated multi-node/NCCL run. ` +
        `Every number is from the real run (${ev.run_id}).`;
      titleCard();
      break;
    }

    case "proc_up": {
      const p = pane(ev.proc);
      p.pid = ev.pid;
      p.pidEl.textContent = ev.pid ? `pid ${ev.pid}` : "";
      paneStatus(ev.proc, "up");
      paneLine(ev.proc, `distributed init — process ${ev.process_index}/${ev.process_count} on ${esc(ev.host)}`, "sys");
      break;
    }

    case "handshake": {
      for (const [k] of S.procs) { const p = S.procs.get(k); if (p.alive) p.el.classList.remove("stalled"); }
      if (ev.attempt > 0) {
        supLine("workers re-rendezvoused — cluster is back", "good");
      } else {
        const each = S.meta?.backend === "gpu" ? " · 1 GPU each" : "";
        caption(`${S.nproc} training processes${each} — stepping in lockstep`, "", 3800);
      }
      sceneEvent("handshake", ev);
      break;
    }

    case "collective_profile": {
      S.collectives = ev;
      const names = { "all-gather": "var(--ag)", "reduce-scatter": "var(--rs)", "all-reduce": "var(--ar)" };
      $("hud-legend").innerHTML = Object.entries(ev.ops || {})
        .filter(([op]) => names[op])
        .map(([op, n]) => `<span class="chip"><span class="sw" style="background:${names[op]}"></span>${op}×${n}</span>`)
        .join("&nbsp;&nbsp;");
      sceneEvent("collectives", ev);
      break;
    }

    case "step": {
      const p = pane(ev.proc);
      p.step = ev.step;
      if (!p.alive) paneStatus(ev.proc, "up");   // resumed worker is stepping again
      p.el.classList.remove("stalled");
      const parts = [`step ${String(ev.step).padStart(5, "0")}`, `<span class="loss">loss ${ev.loss?.toFixed(4)}</span>`];
      if (ev.wall_ms != null && ev.wall_ms < 600000) parts.push(fmtMs(ev.wall_ms));
      paneLine(ev.proc, parts.join(" │ "), "step");   // checkpoint lives in the HUD, not on every line
      if (ev.step > S.maxStep) { S.maxStep = ev.step; hudSet("hud-step", String(ev.step), false); }
      if (ev.wall_ms != null && ev.wall_ms < 60000) {
        S.wallMs.push(ev.wall_ms);
        if (S.wallMs.length > 40) S.wallMs.shift();
        hudMs();
      }
      if (S.curveProc == null) S.curveProc = ev.proc;
      if (ev.proc === S.curveProc && ev.loss != null) {
        // keyed by STEP: a resume overlays the same x — the curve continues, provably unbroken
        while (S.curve.length && S.curve[S.curve.length - 1].step >= ev.step) S.curve.pop();
        S.curve.push({ step: ev.step, loss: ev.loss });
        curveMark();
      }
      sceneEvent("step", ev);
      break;
    }

    case "ckpt": {
      S.ckpt = ev.step;
      hudSet("hud-ckpt", `step ${ev.step}`, false);
      $("hud-ckpt").querySelector(".v").classList.remove("flash");
      void $("hud-ckpt").querySelector(".v").offsetWidth;
      $("hud-ckpt").querySelector(".v").classList.add("flash");
      sceneEvent("ckpt", ev);
      break;
    }

    case "kill": {
      S.killedProc = ev.proc;
      S.killedOnce.add(ev.proc);
      S.killCkpt = ev.ckpt_step;
      paneStatus(ev.proc, "dead");
      paneLine(ev.proc, `SIGKILL → pid ${ev.pid} at step ${ev.step_at_kill}`, "sys");
      supLine(`✗ process ${ev.proc} (pid ${ev.pid}) killed at step ${ev.step_at_kill} — last checkpoint @ ${ev.ckpt_step}`, "kill");
      $("sup-panel").classList.add("hot");
      for (const [k, p] of S.procs) if (k !== ev.proc && p.alive) paneStatus(k, "stalled");
      const gpu = S.meta?.backend === "gpu" ? ` — its GPU's worker is gone` : "";
      caption(`✗ fault injected on purpose: process ${ev.proc} killed at step ${ev.step_at_kill}${gpu}`, "red");
      sceneEvent("kill", ev);
      break;
    }

    case "proc_exit": {
      const p = pane(ev.proc);
      if (ev.proc === S.killedProc || ev.exit_code !== 0) {
        if (!p.el.classList.contains("dead")) paneStatus(ev.proc, "dead");
        paneLine(ev.proc, `exited rc=${ev.exit_code}`, "sys");
      }
      break;
    }

    case "supervisor": {
      supLine(ev.text, "elastic");
      if (S.killedProc != null && !S.ended && /died|restarting/i.test(ev.text || "")) {
        caption(`the supervisor caught the crash — restarting all processes from checkpoint @ ${S.killCkpt ?? "last"}`, "amber");
      }
      sceneEvent("supervisor", ev);
      break;
    }

    case "resume": {
      S.resumes = ev.resumes;
      supLine(`▸ resumed — training continues from checkpoint @ step ${ev.ckpt_step}`, "good");
      $("sup-panel").classList.remove("hot");
      if (ev.resumes === 1) {
        caption(`✓ back alive — resumed from checkpoint ${ev.ckpt_step}, picking up the exact batch it left off`, "green", 5200);
      }
      sceneEvent("resume", ev);
      break;
    }

    case "proof":  sceneEvent("proof", ev); break;
    case "coda":   sceneEvent("coda", ev); break;

    case "profile": {
      S.profile = Object.assign({}, S.profile, ev);
      hudMs();
      break;
    }

    case "line": {
      if (ev.proc != null) {
        const t = ev.text;
        // keep panes readable: surface only load-bearing non-step lines (whitelist, not blacklist)
        if (/Initialized (data loader|train state)|local_batch_size|hlo-collectives|\[profile\]|restor(ed|ing) checkpoint|Loaded norm stats|Waiting for checkpoint/i.test(t)) {
          paneLine(ev.proc, esc(shorten(t)), "sys");
        }
      } else if (ev.text && /demo|PROOF/i.test(ev.text)) {
        supLine(ev.text, "elastic");
      }
      break;
    }

    case "end": {
      S.ended = true;
      sceneEvent("end", ev);
      break;
    }
  }
}

function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }
function shorten(t) { return t.replace(/^\d\d:\d\d:\d\d\.\d+\s+\[\w\]\s+/, "").replace(/\s+\(\d+:[\w./]+:\d+\)\s*$/, ""); }

/* ---------- title card ---------- */
function titleCard() {
  if (Number(qs.get("skipto") || "0") > 5) return;   // dev skipto: don't cover the beat being inspected
  const el = $("title-card");
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), FASTCUT ? 2700 : 3200);
}

/* ---------- scene hooks (traces/camera/overlays attach here; no-op until that layer loads) ---------- */
function sceneEvent(kind, ev) { if (window.__scene) window.__scene(kind, ev); }

/* ---------- live kill (chrome + pane click) ---------- */
let MODE = "live";
let pendingDigit = "";
function liveKill(k) {
  if (MODE !== "live" || S.ended) return;
  fetch(`/kill?proc=${k}`, { method: "POST" }).catch(() => {});
}
addEventListener("keydown", (e) => {
  if (MODE !== "live") return;
  if (/^[0-9]$/.test(e.key)) { pendingDigit = e.key; return; }
  if (e.key === "k") {
    const k = pendingDigit !== "" ? Number(pendingDigit) : null;
    pendingDigit = "";
    fetch(`/kill${k != null ? `?proc=${k}` : ""}`, { method: "POST" }).catch(() => {});
  }
});

/* =========================================================================================
   ingestion: SSE (live) or fetched log (replay, paced) or drag-drop
   ========================================================================================= */
function startLive() {
  MODE = "live";
  $("chrome").innerHTML = `<span class="mode">LIVE — real run</span><span>click a pane (or 0-9 then k) to kill that process</span>`;
  const es = new EventSource("/events");
  es.onmessage = (m) => { try { apply(JSON.parse(m.data)); } catch {} };
  es.onerror = () => {};
}

function startReplay(events) {
  MODE = "replay";
  let speed = Number(qs.get("speed") || "1");
  let paused = false, i = 0;
  const cutLabel = FASTCUT ? "30s cut" : "real pace";
  const chromeLine = () => {
    $("chrome").innerHTML =
      `<span class="mode">REPLAY — recorded real run · ${cutLabel} · ${speed}×${paused ? " · PAUSED" : ""}</span>` +
      (CAPTURE ? "" : `<span>space pause · [ ] speed</span>`);
  };
  chromeLine();
  $("honesty").textContent += "  ·  REPLAY: timing compressed, values verbatim";
  const skipTo = Number(qs.get("skipto") || "0");   // dev: instant-apply everything before this run-time

  // Precompute every event's presentation timestamp, then play them off an absolute playhead clock.
  // (Chaining setTimeout per event drifts by its per-timer overhead — with thousands of events that
  // stretched the cut far past its budget.)
  //
  // 30s cut (DEFAULT for replay): the run is remapped onto a fixed budget per beat —
  //   title/handshake 3.5s · steady state 8s · kill (red) 3s · supervisor (amber) 3s · resume (green) 3s ·
  //   proof overlay ~6s · end card ~3s. Values untouched; only time is remapped.
  // The proof overlay and end card ride the tail after `en` on their own timers (see the scene layer).
  // ?realtime=1 disables this and plays real pacing with long gaps (compiles, backoff) idle-compressed to <=1.6s.
  const pt = new Array(events.length);
  let knots = null;
  if (FASTCUT && !skipTo) {
    const tOf = (type) => { const e = events.find(x => x.type === type); return e ? e.t : null; };
    const hs = tOf("handshake"), kl = tOf("kill"), rs = tOf("resume"), en = events[events.length - 1].t;
    if (hs != null && kl != null && rs != null && hs < kl && kl < rs && rs < en) {
      knots = [[0, 0], [hs, 3.5], [kl, 11.5], [rs, 17.5], [en, 20.5]];
    }
  }
  if (knots) {
    const presAt = (t) => {
      for (let k = 1; k < knots.length; k++) {
        if (t <= knots[k][0]) {
          const [t0, p0] = knots[k - 1], [t1, p1] = knots[k];
          return p0 + (p1 - p0) * (t - t0) / Math.max(t1 - t0, 1e-9);
        }
      }
      return knots[knots.length - 1][1];
    };
    for (let k = 0; k < events.length; k++) pt[k] = presAt(events[k].t);
  } else {
    let acc = 0;
    for (let k = 0; k < events.length; k++) {
      if (k > 0) acc += Math.min(Math.max(0, events[k].t - events[k - 1].t), 1.6);
      pt[k] = acc;
    }
  }

  while (i < events.length && events[i].t < skipTo) apply(events[i++]);
  let playhead = i > 0 && i < events.length ? pt[i] : 0;
  let last = performance.now();
  const tick = setInterval(() => {
    const now = performance.now();
    if (!paused) playhead += (now - last) / 1000 * speed;
    last = now;
    while (i < events.length && pt[i] <= playhead) apply(events[i++]);
    if (i >= events.length) clearInterval(tick);
  }, 16);
  addEventListener("keydown", (e) => {
    if (e.key === " ") { e.preventDefault(); paused = !paused; chromeLine(); }
    else if (e.key === "]") { speed = Math.min(16, speed * 2); chromeLine(); }
    else if (e.key === "[") { speed = Math.max(0.25, speed / 2); chromeLine(); }
  });
}

async function boot() {
  if (qs.get("mode") === "replay" || qs.get("replay")) {
    const url = qs.get("replay") || "/log";
    const txt = await (await fetch(url)).text();
    startReplay(txt.trim().split("\n").filter(Boolean).map(l => JSON.parse(l)));
  } else {
    // probe: if /events exists we're being served by demo_sharder --live; else await drag-drop
    try {
      const r = await fetch("/log", { method: "GET" });
      if (r.ok) { startLive(); return; }
    } catch {}
    $("chrome").innerHTML = `<span class="mode">drop a run .jsonl to replay</span>`;
  }
}
addEventListener("dragover", e => e.preventDefault());
addEventListener("drop", async (e) => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const txt = await f.text();
  startReplay(txt.trim().split("\n").filter(Boolean).map(l => JSON.parse(l)));
});
boot();
</script>

<script>
"use strict";
/* =========================================================================================
   SCENE LAYER — traces (communication as light), camera, choreography, proof/coda/end.
   Pure presentation: every value rendered below comes from the event object it is handed.
   ========================================================================================= */
(function () {
  const world = $("world"), driftEl = $("drift"), traces = $("traces");
  const OP_COLOR = { "all-gather": "var(--ag)", "reduce-scatter": "var(--rs)", "all-reduce": "var(--ar)" };
  const OP_GLOW  = { "all-gather": "#35e0ff", "reduce-scatter": "#ff4fd8", "all-reduce": "#ffb454" };

  /* ---------------- camera ---------------- */
  const cam = {
    target: null,
    to(el, scale = 1.55, ms = 1400) {
      if (!el) return this.wide(ms);
      world.style.transitionDuration = REDUCED ? "0s" : ms + "ms";
      const r = el.getBoundingClientRect();
      const w = innerWidth, h = innerHeight;
      // current rect is post-transform; solve for the translate that centers the element at `scale`
      const cur = this._cur || { x: 0, y: 0, s: 1 };
      const ex = (r.left + r.width / 2 - cur.x - w / 2 * (1 - cur.s)) / cur.s;
      const ey = (r.top + r.height / 2 - cur.y - h / 2 * (1 - cur.s)) / cur.s;
      const x = w / 2 - ex * scale - w / 2 * (1 - scale);
      const y = h / 2 - ey * scale - h / 2 * (1 - scale);
      this._cur = { x, y, s: scale };
      world.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      this.target = el;
    },
    wide(ms = 1600) {
      world.style.transitionDuration = REDUCED ? "0s" : ms + "ms";
      world.style.transform = "translate(0px, 0px) scale(1)";
      this._cur = { x: 0, y: 0, s: 1 };
      this.target = null;
    },
  };

  /* idle drift: a breath, not a wobble. capture keeps a fixed frame; reduced-motion disables. */
  if (!CAPTURE && !REDUCED) {
    let t0 = performance.now();
    (function drift(now) {
      const t = (now - t0) / 1000;
      const x = Math.sin(t * 2 * Math.PI / 37) * 5;
      const y = Math.cos(t * 2 * Math.PI / 53) * 4;
      driftEl.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(drift);
    })(t0);
  }

  /* ---------------- traces ---------------- */
  const T = { edges: [], ring: null, ops: [], built: false, lastPulse: 0 };

  function paneAnchor(k) {
    // anchor at the pane's foot: traces read as an interconnect bus under the hardware, never over text
    const p = S.procs.get(k);
    if (!p) return null;
    const r = p.el.getBoundingClientRect();
    const w = world.getBoundingClientRect();
    return { x: r.left - w.left + r.width / 2, y: r.top - w.top + r.height - 4 };
  }

  function buildTraces() {
    if (!S.collectives || S.procs.size < 2) return;
    traces.innerHTML = "";
    T.edges = []; T.ring = null;
    T.ops = Object.keys(S.collectives.ops || {}).filter(op => OP_COLOR[op] && S.collectives.ops[op] > 0);
    const ks = [...S.procs.keys()].sort((a, b) => a - b);
    traces.setAttribute("width", innerWidth); traces.setAttribute("height", innerHeight);
    traces.setAttribute("viewBox", `0 0 ${innerWidth} ${innerHeight}`);
    // The bus lives in the strip between the pane feet and the bottom row — lanes scale to that strip and
    // never spill over the loss/supervisor panels, whatever the window's aspect ratio.
    const worldTop = world.getBoundingClientRect().top;
    const feetY = Math.max(...ks.map(k => paneAnchor(k)).filter(Boolean).map(c => c.y));
    const stripBottom = document.getElementById("bottom").getBoundingClientRect().top - worldTop;
    const lane = Math.min(Math.max(stripBottom - feetY - 8, 26), 130);
    const edgeOps = T.ops.filter(op => op !== "all-reduce");
    for (let i = 0; i < ks.length; i++) {
      for (let j = i + 1; j < ks.length; j++) {
        const a = paneAnchor(ks[i]), b = paneAnchor(ks[j]);
        if (!a || !b) continue;
        edgeOps.forEach((op, oi) => {
          const off = (oi - (edgeOps.length - 1) / 2) * lane * 0.14;
          const sag = lane * (0.42 + (j - i - 1) * 0.30) + off;
          const mx = (a.x + b.x) / 2, my = Math.min(Math.max(a.y, b.y) + sag, feetY + lane * 0.92);
          const d = `M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}`;
          const base = mkPath(d, OP_COLOR[op], 2, "base");
          T.edges.push({ a: ks[i], b: ks[j], op, d, base });
        });
      }
    }
    // all-reduce is a ring THROUGH all panes (that is its topology), not a pane-pair edge: out along the
    // deepest lane and back just under the pane feet.
    if (T.ops.includes("all-reduce") && ks.length >= 2) {
      const cs = ks.map(paneAnchor).filter(Boolean);
      const first = cs[0], last = cs[cs.length - 1];
      const deep = feetY + lane * 1.06;   // control point; the curve itself stays within ~lane*0.9
      let d = `M ${first.x} ${first.y + 8}`;
      d += ` Q ${(first.x + last.x) / 2} ${deep} ${last.x} ${last.y + 8}`;
      for (let i = cs.length - 2; i >= 0; i--) {
        const p = cs[i], q = cs[i + 1];
        d += ` Q ${(p.x + q.x) / 2} ${Math.max(p.y, q.y) + lane * 0.14} ${p.x} ${p.y + 8}`;
      }
      T.ring = { d, base: mkPath(d, OP_COLOR["all-reduce"], 2, "base ring-base") };
    }
    T.built = true;
  }

  function mkPath(d, stroke, wpx, cls) {
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", d);
    p.setAttribute("stroke", stroke);
    p.setAttribute("stroke-width", wpx);
    p.setAttribute("class", cls);
    traces.appendChild(p);
    return p;
  }

  /* a pulse: a short bright dash traveling the path. reverse flips direction (gather vs scatter). */
  function pulse(d, op, { reverse = false, dur = 700, width = 3 } = {}) {
    if (REDUCED) return;
    const p = mkPath(d, OP_GLOW[op], width, "pulse");
    const len = p.getTotalLength();
    p.style.filter = `drop-shadow(0 0 6px ${OP_GLOW[op]})`;
    p.setAttribute("stroke-dasharray", `${len * 0.16} ${len}`);
    const from = reverse ? -len * 0.16 : len;
    const to = reverse ? len : -len * 0.16;
    const anim = p.animate(
      [{ strokeDashoffset: from, opacity: 0.9 }, { strokeDashoffset: to, opacity: 0.55 }],
      { duration: dur, easing: "cubic-bezier(0.4, 0, 0.6, 1)" });
    anim.onfinish = () => p.remove();
  }

  function pulseAll(now) {
    if (!T.built || now - T.lastPulse < 260) return;   // volley throttle: keeps 60fps and reads as rhythm
    T.lastPulse = now;
    for (const e of T.edges) {
      const aDead = isDead(e.a), bDead = isDead(e.b);
      e.base.classList.toggle("dead", aDead || bDead);
      if (aDead || bDead) continue;
      // all-gather: shards travel OUT to peers (both directions); reduce-scatter: partials converge IN
      if (e.op === "all-gather") { pulse(e.d, e.op); pulse(e.d, e.op, { reverse: true }); }
      else if (e.op === "reduce-scatter") { pulse(e.d, e.op, { reverse: T.flip = !T.flip, dur: 850 }); }
    }
    if (T.ring && ![...S.procs.values()].some(p => !p.alive && p.el.classList.contains("dead"))) {
      pulse(T.ring.d, "all-reduce", { dur: 1000 });
    }
  }

  function isDead(k) { const p = S.procs.get(k); return p && p.el.classList.contains("dead"); }

  function igniteTraces() {
    buildTraces();
    if (REDUCED) return;
    let i = 0;
    for (const e of T.edges) setTimeout(() => pulse(e.d, e.op, { dur: 1100, width: 4 }), 120 * i++);
    if (T.ring) setTimeout(() => pulse(T.ring.d, "all-reduce", { dur: 1500, width: 4 }), 120 * i);
  }
  addEventListener("resize", () => { if (T.built) buildTraces(); });

  /* ---------------- proof overlay (typed, sequenced) ---------------- */
  const HOLD = FASTCUT ? 0.75 : 1;   // overlay sequence pacing; the 30s cut gives the proof room to read
  function seq(steps) {  // [[delayMs, fn], ...] cumulative
    let t = 0;
    for (const [dt, fn] of steps) { t += dt * HOLD; setTimeout(fn, t); }
    return t;
  }

  function idxRow(label, arr, cls) {
    return `<div class="idx-row ${cls || ""}"><span class="row-label">${label}</span>` +
      arr.map(v => `<span class="idx">${v}</span>`).join("") + `</div>`;
  }

  function showProof(ev) {
    captionClear();   // the overlay tells this part of the story itself
    const box = $("proof-box");
    const B = ev.reference.length;
    box.innerHTML = `
      <h2>THE PROOF — resume is on the exact data <span class="src">· openpi.training.data_sharding</span></h2>
      <div class="proof-line" id="pf-1"><code>resume_position(step=${ev.step}, N=${S.meta?.dataset_len}, B=${B})
        → (epoch ${ev.epoch}, offset ${ev.offset})</code></div>
      ${idxRow("never-crashed run @ " + ev.step, ev.reference, "pf-ref")}
      ${idxRow("resumed run @ " + ev.step, ev.resumed, "pf-res")}
      <div class="sha-line" id="pf-sha">
        <span>sha256(reference) <b>${ev.sha_ref}</b></span><span>sha256(resumed) <b>${ev.sha_res}</b></span>
      </div>
      <div class="verdict ${ev.identical ? "ok" : "bad"}" id="pf-verdict">
        ${ev.identical ? "✓ IDENTICAL — 0 examples skipped, 0 duplicated" : "✗ MISMATCH"}
      </div>`;
    $("proof-card").classList.add("show");
    const ref = box.querySelector(".pf-ref"), res = box.querySelector(".pf-res");
    const total = seq([
      [300, () => $("pf-1").classList.add("show")],
      [900, () => ref.classList.add("show")],
      [700, () => res.classList.add("show")],
      [700, () => {
        const a = ref.querySelectorAll(".idx"), b = res.querySelectorAll(".idx");
        for (let i = 0; i < a.length; i++) setTimeout(() => {
          const ok = a[i].textContent === b[i].textContent;
          a[i].classList.add(ok ? "match" : "mismatch");
          b[i].classList.add(ok ? "match" : "mismatch");
        }, i * 140 * HOLD);
      }],
      [B * 140 + 600, () => $("pf-sha").classList.add("show")],
      [1100, () => $("pf-verdict").classList.add("show")],
    ]);
    const dismissAt = total + (FASTCUT ? 2400 : 4500);
    setTimeout(() => { $("proof-card").classList.remove("show"); proofDone(); }, dismissAt);
    $("proof-card").onclick = () => { $("proof-card").classList.remove("show"); proofDone(); };
  }

  /* the coda / end card wait for the proof to leave the screen (chained, not raced) */
  let pendingCoda = null, pendingEnd = null, proofFinished = false;
  function skippedPast(ev) { return ev.t < Number(qs.get("skipto") || "0") - 12; }
  function proofDone() {
    if (proofFinished) return;
    proofFinished = true;
    if (pendingCoda) { const ev = pendingCoda; pendingCoda = null; setTimeout(() => showCoda(ev), 900); }
    maybeShowEnd();
  }
  // In the capture cut the end card always follows the proof (a kill run has a proof), so it chains off
  // proofDone rather than firing when the `end` event lands mid-proof.
  function maybeShowEnd() {
    if (!pendingEnd) return;
    if (FASTCUT && S.killedProc != null && !proofFinished) return;
    const ev = pendingEnd; pendingEnd = null;
    setTimeout(() => showEnd(ev), 500);
  }

  function showCoda(ev) {
    const box = $("coda-box");
    box.innerHTML = `
      <h2>WHY WITHIN-BATCH SHARDING <span class="src">· global batch @ step ${ev.step}, three ways</span></h2>
      ${idxRow("single-process reference", ev.reference, "cd-ref")}
      ${idxRow("naive: dataset k::N + per-proc shuffle", ev.naive_stripe, "cd-naive")}
      ${idxRow("sharder: within-batch shard", ev.within_batch, "cd-wb")}
      <div class="proof-line" id="cd-note">naive striping trains on <b style="color:var(--bad)">different examples</b>
        ${ev.naive_same_examples === false ? "(not even the same members)" : ""} —
        within-batch reconstructs the reference <b style="color:var(--ok)">bit-identically</b>
        (${ev.within_batch_identical ? "verified" : "FAILED"} this run)</div>`;
    $("coda-card").classList.add("show");
    const ref = box.querySelector(".cd-ref"), nv = box.querySelector(".cd-naive"), wb = box.querySelector(".cd-wb");
    const refIdx = [...ref.querySelectorAll(".idx")].map(e => e.textContent);
    const total = seq([
      [300, () => ref.classList.add("show")],
      [800, () => {
        nv.classList.add("show");
        [...nv.querySelectorAll(".idx")].forEach((e, i) => setTimeout(() =>
          e.classList.add(e.textContent === refIdx[i] ? "match" : "mismatch"), i * 120 * HOLD));
      }],
      [refIdx.length * 120 + 500, () => {
        wb.classList.add("show");
        [...wb.querySelectorAll(".idx")].forEach((e, i) => setTimeout(() =>
          e.classList.add(e.textContent === refIdx[i] ? "match" : "mismatch"), i * 120 * HOLD));
      }],
      [refIdx.length * 120 + 500, () => $("cd-note").classList.add("show")],
    ]);
    setTimeout(() => $("coda-card").classList.remove("show"), total + (CAPTURE ? 5600 : 4000));
    $("coda-card").onclick = () => $("coda-card").classList.remove("show");
  }

  function showEnd(ev) {
    $("proof-card").classList.remove("show");   // the end card owns the screen
    $("coda-card").classList.remove("show");
    captionClear();
    $("end-inner").innerHTML = `
      <h1>SHARDER</h1>
      <div class="runline">
        this run: ${S.maxStep >= 0 ? `step ${S.maxStep}` : ""} · ${ev.kills ?? 0} kill${(ev.kills ?? 0) === 1 ? "" : "s"} survived ·
        last checkpoint @ ${S.ckpt ?? "—"} · wall ${fmtWall(ev.t)} · run ${S.meta?.run_id} @ ${S.meta?.git_sha}
      </div>
      <div class="findings">
        <div class="cap">MEASURED SEPARATELY ON 4×H100 (FINDINGS.md — not this run)</div>
        flash attention <b>+9.3% step time</b> (195.9 → 177.6 ms, bit-identical loss) ·
        weak scaling <b>2.85× / 980 TFLOP/s aggregate</b> at 4 GPUs ·
        single-GPU <b>32.1% MFU</b> (gemma_2b, batch 4, full AdamW)
      </div>
      <div class="repo">github.com/virkvarjun/OpenPI-GPU · branch feat/jax-multihost-v1</div>`;
    $("end-card").classList.add("show");
  }

  /* ---------------- choreography ----------------
     The camera stays WIDE through the fault arc — the story is told by the pane going red, the caption,
     and the supervisor panel, not by a zoom. */
  window.__scene = function (kind, ev) {
    switch (kind) {
      case "handshake":
        setTimeout(() => { igniteTraces(); cam.wide(); }, S.collectives ? 200 : 0);
        break;
      case "collectives":
        if (S.procs.size >= 2 && !T.built) igniteTraces();
        break;
      case "step":
        if (!T.built && S.collectives && S.procs.size >= 2) buildTraces();
        pulseAll(performance.now());
        break;
      case "ckpt":
        break; // HUD flash carries it; restraint
      case "kill": {
        for (const e of T.edges) if (e.a === ev.proc || e.b === ev.proc) e.base.classList.add("dead");
        break;
      }
      case "supervisor":
        break; // the caption + supervisor panel carry this beat
      case "resume": {
        for (const e of T.edges) e.base.classList.remove("dead");
        break;
      }
      case "proof":
        if (skippedPast(ev)) { proofDone(); break; }   // dev skipto jumped well beyond this beat
        // 30s cut: hold on the green "back alive" caption ~3s before the proof takes the screen
        setTimeout(() => showProof(ev), FASTCUT ? 3000 : 1200 * HOLD);
        break;
      case "coda":
        if (skippedPast(ev) || FASTCUT) break;   // the 20s cut ends on the proof; coda plays only in ?realtime=1
        if (proofFinished) setTimeout(() => showCoda(ev), 900);
        else pendingCoda = ev;   // chained behind the proof overlay's dismissal
        break;
      case "end":
        if (FASTCUT) { pendingEnd = ev; maybeShowEnd(); }   // chains after the proof dismisses (see maybeShowEnd)
        else setTimeout(() => showEnd(ev), 1200);
        break;
    }
  };
})();
</script>
</body>
